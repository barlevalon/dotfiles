[custom]

[custom.reboot]
command = "test -x /usr/bin/pacman && [ \"$(uname -r | sed 's/-arch/.arch/')\" != \"$(pacman -Q linux 2>/dev/null | awk '{print $2}')\" ] && echo \"[↻ reboot]\" || true"
shell = ["sh"]
style = "bold yellow"
format = "$output"
description = "Shows when kernel update requires reboot"

