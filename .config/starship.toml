disabled = false
format = "\\[[$symbol$context( \\($namespace\\))]($style)\\]"
symbol = "󱃾 "

[[kubernetes.contexts]]
context_pattern = "arn:aws:eks:(?P<var_region>.*):(?P<var_account>.*):cluster/(?P<var_cluster>.*)"
context_alias = "$var_account/$var_region"

