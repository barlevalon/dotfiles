"$schema" = "https://starship.rs/config-schema.json"
format = "$username$directory$git_branch$git_commit$git_state$git_metrics$git_status$docker_context$package$terraform$aws$kubernetes${custom.reboot}$cmd_duration$line_break$battery$jobs$status$character"
command_timeout = 2000
palette = "base16"

[aws]
symbol = "  "
format = "\\[[$symbol($profile)($region)(\\[$duration\\])]($style)\\]"

[c]
format = "\\[[$symbol($version(-$name))]($style)\\]"
symbol = " "

[cmake]
format = "\\[[$symbol($version)]($style)\\]"
symbol = " "

[cmd_duration]
format = "\\[[⏱ $duration]($style)\\]"

[cobol]
format = "\\[[$symbol($version)]($style)\\]"
symbol = " "

[conda]
