# Vivaldi hardware acceleration flags for NVIDIA + Wayland
# Place this file at ~/.config/vivaldi-stable.conf

# Force Wayland backend
--ozone-platform=wayland

# Enable VA-API video hardware decoding
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks

# GPU acceleration settings
--enable-gpu-rasterization
--enable-zero-copy
--ignore-gpu-blocklist

# NVIDIA-specific: disable skia renderer which can cause issues
--disable-features=UseSkiaRenderer

# Additional performance flags
--enable-hardware-overlays
--disable-gpu-vsync
