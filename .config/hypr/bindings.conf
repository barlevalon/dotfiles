# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, omarchy-launch-tui yazi
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp whatsapp "https://web.whatsapp.com/"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- bitwarden-desktop

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-or-focus-webapp "vivaldi-calendar" "https://app.fastmail.com/calendar"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-or-focus-webapp "vivaldi-mail" "https://mail.hearter.io"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp vivaldi-youtube "https://youtube.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp vivaldi-messages "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-or-focus-webapp vivaldi-x "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-or-focus-webapp vivaldi-x "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
 
bind = SUPER SHIFT ALT CTRL, S, swapsplit

# Webcam
bindd = SUPER SHIFT, W, Toggle webcam flip, exec, ~/.config/hypr/scripts/webcam-flip-toggle

# Mouse back/forward buttons -> Alt+Left/Right
bind = , mouse:275, sendshortcut, ALT, Left,
bind = , mouse:276, sendshortcut, ALT, Right,
